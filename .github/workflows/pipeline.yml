name: CI/CD Pipeline

on:
  push:
    branches:
      - main

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Login to ACR
      uses: docker/login-action@v2
      with:
        registry: ${{ secrets.ACR_LOGIN_SERVER }}
        username: ${{ secrets.ACR_USERNAME }}
        password: ${{ secrets.ACR_PASSWORD }}

    - name: Build and Push Docker image
      uses: docker/build-push-action@v4
      with:
        context: .
        file: src/main/docker/Dockerfile.jvm
        push: true
        tags: |
          ${{ secrets.ACR_LOGIN_SERVER }}/catalog-service:${{ github.run_number }}
          ${{ secrets.ACR_LOGIN_SERVER }}/catalog-service:latest

  deploy:
    runs-on: ubuntu-latest
    needs: build-and-push
    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Login to Azure
      uses: azure/login@v1
      with:
        creds: ${{ secrets.AZURE_CREDENTIALS }}

    - name: Get AKS credentials
      run: |
        az aks get-credentials \
          --resource-group rg-catalog-service \
          --name aks-catalog-service

    - name: Deploy to AKS
      run: |
        sed -i 's|\$(Build.BuildId)|${{ github.run_number }}|g' k8s/deployment.yml
        kubectl apply -f k8s/deployment.yml
        kubectl apply -f k8s/service.yml
