trigger:
  branches:
    include:
      - main

variables:
  acrName: 'acrcatalogservice'
  acrLoginServer: 'acrcatalogservice.azurecr.io'
  imageName: 'catalog-service'
  resourceGroup: 'rg-catalog-service'
  aksCluster: 'aks-catalog-service'
  tag: '$(Build.BuildId)'

stages:
- stage: Build
  displayName: 'Build & Push Image'
  jobs:
  - job: BuildJob
    pool:
      vmImage: 'ubuntu-latest'
    steps:
    - task: Docker@2
      displayName: 'Build and Push to ACR'
      inputs:
        containerRegistry: 'acr-connection'
        repository: '$(imageName)'
        command: 'buildAndPush'
        Dockerfile: 'Dockerfile'
        tags: |
          $(tag)
          latest

- stage: Deploy
  displayName: 'Deploy to AKS'
  dependsOn: Build
  jobs:
  - job: DeployJob
    pool:
      vmImage: 'ubuntu-latest'
    steps:
    - task: AzureCLI@2
      displayName: 'Deploy to AKS'
      inputs:
        azureSubscription: 'azure-connection'
        scriptType: 'bash'
        scriptLocation: 'inlineScript'
        inlineScript: |
          az aks get-credentials --resource-group $(resourceGroup) --name $(aksCluster)
          sed -i 's|\$(Build.BuildId)|$(tag)|g' k8s/deployment.yml
          kubectl apply -f k8s/deployment.yml
          kubectl apply -f k8s/service.yml
